
<!DOCTYPE html>
<html lang="en">
<head>

    <title>Refresh Hockey | Professional Field Hockey</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,600;0,700;0,800;0,900;1,400;1,900&family=Oswald:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#95ff03',
                        secondary: '#023ad0',
                        dark: '#050505',
                        brand: '#95ff03'
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        sports: ['Inter', 'sans-serif'],
                    },
                    boxShadow: {
                        'sports': '0 25px 50px -12px rgba(0, 0, 0, 0.9)',
                        'orange-glow': '0 0 40px rgba(244, 108, 36, 0.4)',
                    }
                }
            }
        }
    </script>
    <style>
        :root {
            --sat: env(safe-area-inset-top);
            --sab: env(safe-area-inset-bottom);
        }
        body {
            background-color: #050505;
            color: #ffffff;
            -webkit-tap-highlight-color: transparent;
            -webkit-text-size-adjust: 100%;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
            min-height: -webkit-fill-available;
            overscroll-behavior-y: none;
            touch-action: manipulation;
        }
        html {
            height: -webkit-fill-available;
        }

        /* OKAMŽITÝ LOADER PRE XCODE / IOS */
        #app-preloader {
            position: fixed;
            inset: 0;
            background: #050505;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.5s ease-out;
        }
        .loader-logo {
            width: 60px;
            height: auto;
            margin-bottom: 30px;
            filter: drop-shadow(0 0 20px rgba(149, 255, 3, 0.3));
            animation: pulse-logo 2s infinite ease-in-out;
        }
        .loader-bar-container {
            width: 140px;
            height: 2px;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            overflow: hidden;
        }
        .loader-bar-fill {
            width: 100%;
            height: 100%;
            background: #95ff03;
            transform: translateX(-100%);
            animation: loading-slide 2s infinite ease-in-out;
            box-shadow: 0 0 10px #95ff03;
        }
        @keyframes pulse-logo {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 1; }
        }
        @keyframes loading-slide {
            0% { transform: translateX(-100%); }
            50% { transform: translateX(0%); }
            100% { transform: translateX(100%); }
        }

        .bg-stadium {
            background-color: #050505;
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(149, 255, 3, 0.08) 0%, transparent 75%),
                url('https://www.transparenttextures.com/patterns/dark-matter.png');
        }
        .text-hero-main {
            font-size: clamp(2rem, 10.5vw, 8.5rem);
            text-shadow: 0 10px 30px rgba(0,0,0,0.9), 0 0 50px rgba(34, 197, 94, 0.2);
            letter-spacing: -0.05em;
            line-height: 1;
            white-space: nowrap;
        }
        .hero-vignette {
            background: radial-gradient(circle at center, transparent 0%, rgba(5,5,5,0.2) 50%, #050505 100%);
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-pro-in {
            animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
    </style>

<script type="importmap">

        <div class="loader-bar-container">
            <div class="loader-bar-fill"></div>
        </div>
        <p style="color: rgba(255,255,255,0.2); font-size: 8px; margin-top: 15px; font-weight: 900; letter-spacing: 0.3em;">Get started! The players are getting ready.</p>
    </div>

    <div id="root"></div>
